name: Feature Proposal
description: Propose an improvement or addition to the handbook, repository structure, or contributor experience.
title: "[Proposal]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for proposing an improvement! We focus on capturing enduring principles and structures. Please describe the problem or gap in our existing guidance before prescribing an implementation.
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: A clear description of the problem, gap, or opportunity in the repository.
      placeholder: What problem or gap are we addressing?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this important to resolve? How does it improve the clarity or effectiveness of the handbook or repository structure?
      placeholder: Explain the motivation...
    validations:
      required: true
  - type: textarea
    id: proposed-improvement
    attributes:
      label: Proposed Improvement
      description: A description of the proposed addition, update, or structural improvement.
      placeholder: Describe the proposed improvement...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative structures or approaches you considered.
      placeholder: What alternatives were considered?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context or references about the proposal here.
      placeholder: Any other info...
    validations:
      required: false
