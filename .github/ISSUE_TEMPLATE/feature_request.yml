name: Feature Proposal
description: Propose an improvement, framework addition, or capability design.
title: "[Proposal]: "
labels: ["proposal"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement! We focus on capturing enduring principles and structures. Please describe the problem you want to solve rather than prescribing an implementation.
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: A clear and concise description of the problem this proposal addresses.
      placeholder: What problem are we solving?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this important to resolve? How does it affect the operational or architectural success of the Studio?
      placeholder: Explain the motivation...
    validations:
      required: true
  - type: textarea
    id: proposed-improvement
    attributes:
      label: Proposed Improvement
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the proposed improvement...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you considered.
      placeholder: What alternatives were considered?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, issues linked, or details about the feature proposal here.
      placeholder: Any other info...
    validations:
      required: false
